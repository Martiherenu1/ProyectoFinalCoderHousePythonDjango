{% extends "myapp/base.html" %}

{% block contenido %}
<div class="row justify-content-center min-vh-75 align-items-center my-4">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 shadow-lg border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-calendar2-check fs-1 text-gold mb-3 d-block"></i>
                    <h2 class="card-title fw-bold font-playfair">Reservar Turno</h2>
                    <p class="text-muted">Elige el servicio, la fecha y la hora que mejor te queden.</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-gold btn-lg">Confirmar Reserva</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const fechaInput = document.getElementById("id_fecha");
        const horaSelect = document.getElementById("id_hora");

        if (fechaInput && horaSelect) {
            fechaInput.addEventListener("change", function() {
                const fecha = this.value;
                if (fecha) {
                    fetch(`/turno/horarios-disponibles/?fecha=${fecha}`)
                        .then(response => response.json())
                        .then(data => {
                            horaSelect.innerHTML = ""; // Limpiar opciones
                            if (data.horarios.length > 0) {
                                data.horarios.forEach(hora => {
                                    const option = document.createElement("option");
                                    option.value = hora;
                                    option.textContent = hora;
                                    horaSelect.appendChild(option);
                                });
                            } else {
                                const option = document.createElement("option");
                                option.value = "";
                                option.textContent = "Sin horarios disponibles";
                                horaSelect.appendChild(option);
                            }
                        })
                        .catch(error => console.error('Error fetching schedules:', error));
                } else {
                    horaSelect.innerHTML = "";
                }
            });
            
            // Disparar el evento change si ya hay una fecha pre-seleccionada
            if (fechaInput.value) {
                fechaInput.dispatchEvent(new Event("change"));
            } else {
                // Opción por defecto
                horaSelect.innerHTML = '<option value="">Seleccione una fecha primero</option>';
            }
        }
    });
</script>

<style>
    .min-vh-75 { min-height: 75vh; }
    /* Estilizar el form de Django */
    form p { text-align: left; margin-bottom: 1.2rem; }
    form label { font-weight: 500; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block; }
    form input, form select { width: 100%; padding: 0.75rem 1rem; border-radius: 4px; border: 1px solid var(--border-subtle); background-color: var(--bg-secondary); color: var(--text-main); }
    form input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }
    form input:focus, form select:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.25); }
    .helptext { font-size: 0.8rem; color: #6c757d; display: block; margin-top: 0.25rem; }
    .errorlist { color: var(--accent-red); list-style-type: none; padding-left: 0; font-size: 0.85rem; text-align: left; margin-bottom: 1rem; }
</style>
{% endblock %}
