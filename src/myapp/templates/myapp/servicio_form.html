{% extends "myapp/base.html" %}

{% block contenido %}
    <h2>{% if object %}Editar Servicio: {{ object.nombre }}{% else %}Añadir Nuevo Servicio{% endif %}</h2>
    
    <form method="post">
        {% csrf_token %}
        <table border="0">
            {{ form.as_table }}
        </table>
        <br>
        <button type="submit">{% if object %}Guardar Cambios{% else %}Crear Servicio{% endif %}</button>
    </form>
    
    <br>
    <a href="{% url 'lista_servicios' %}">Volver a la lista</a>
{% endblock %}
