{% extends "myapp/base.html" %}

{% block contenido %}
<div class="row justify-content-center min-vh-75 align-items-center my-4">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 shadow-lg border-0">
            <div class="card-body text-center">
                <i class="bi bi-person-plus fs-1 text-gold mb-3 d-block"></i>
                <h2 class="card-title fw-bold mb-4 font-playfair">Crear Cuenta</h2>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-gold btn-lg">Registrarse</button>
                    </div>
                </form>

                <div class="mt-4 pt-3 border-top border-dark">
                    <p class="text-muted mb-0">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-gold text-decoration-none">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .min-vh-75 { min-height: 75vh; }
    /* Estilizar el form de Django - igual a login pero aplicado aquí también por si acaso */
    form p { text-align: left; margin-bottom: 1rem; }
    form label { font-weight: 500; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.3rem; display: block; }
    form input { width: 100%; padding: 0.75rem 1rem; border-radius: 4px; border: 1px solid var(--border-subtle); background-color: var(--bg-secondary); color: var(--text-main); }
    form input:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.25); }
    .helptext { font-size: 0.8rem; color: #6c757d; display: block; margin-top: 0.25rem; }
    .errorlist { color: var(--accent-red); list-style-type: none; padding-left: 0; font-size: 0.85rem; text-align: left; margin-bottom: 1rem; }
    ul { list-style-type: none; padding-left: 0; }
</style>
{% endblock %}
