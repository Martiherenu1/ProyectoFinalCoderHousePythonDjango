{% extends "myapp/base.html" %}

{% block contenido %}
    <h2>Confirmar Eliminación</h2>
    
    <p>¿Estás seguro de que deseas eliminar el servicio <strong>"{{ object.nombre }}"</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'lista_servicios' %}">Cancelar</a>
    </form>
{% endblock %}
